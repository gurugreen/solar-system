name: Container Solar System Workflow

on:
  push:
jobs:
  Build:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    container:
      image: node:22
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://mongodb:27017/superData
      MONGO_USERNAME: ""
      MONGO_PASSWORD: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Cache Node.js modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm install
      - name: Seeding seed.js
        run: node seed.js
      - name: Run tests
        run: npm test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.xml
      - name: Download test results
        uses: actions/download-artifact@v7
        with:
          name: test-results
      - name: Display test results
        run: cat test-results.xml
  Docker:
    timeout-minutes: 3
    needs: [Build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
      - name: Docker Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
  Deploy:
    needs: [Docker]
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Kubectl Install
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.36.0"
      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - name: Kubectl Version
        run: |
          kubectl version
          echo "Kubernetes context set to: $(kubectl config current-context)"
          kubectl get nodes
      - name: Save Nginx Ingress IP
        id: ingress
        run: |
          echo "INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')" >> $GITHUB_ENV

      - name: Replace tokens in manifests
        uses: cschleiden/replace-tokens@v1
        with:
          tokenPrefix: "{_"
          tokenSuffix: "_}"
          files: kubernetes/development/*.yaml
        env:
          NAMESPACE: ${{ vars.NAMESPACE }}
          REPLICAS: ${{ vars.REPLICAS }}
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
          INGRESS_IP: ${{ env.INGRESS_IP }}

      - name: Verify replaced manifests
        run: cat kubernetes/development/*.yaml
